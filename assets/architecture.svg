    <animate attributeName="opacity" dur="7s" repeatCount="indefinite" keyTimes="0;0.28;0.31;0.40;0.42;1" values="0;0;1;1;0;0"/>
    <animate attributeName="r" values="5;6.5;5" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="5.5" fill="#D97757" filter="url(#glow)" opacity="0">
    <animateMotion dur="7s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.29;0.42;1" keyPoints="0;0;1;1" path="M659,212 C711,212 711,320 762,320"/>
    <animate attributeName="opacity" dur="7s" repeatCount="indefinite" keyTimes="0;0.28;0.31;0.40;0.42;1" values="0;0;1;1;0;0"/>
    <animate attributeName="r" values="5;6.5;5" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="5.5" fill="#D97757" filter="url(#glow)" opacity="0">
    <animateMotion dur="7s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.45;0.60;1" keyPoints="0;0;1;1" path="M911,104 C957,104 957,212 1002,212"/>
    <animate attributeName="opacity" dur="7s" repeatCount="indefinite" keyTimes="0;0.44;0.47;0.58;0.60;1" values="0;0;1;1;0;0"/>
    <animate attributeName="r" values="5;6.5;5" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="5.5" fill="#D97757" filter="url(#glow)" opacity="0">
    <animateMotion dur="7s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.45;0.60;1" keyPoints="0;0;1;1" path="M916,212 L1002,212"/>
    <animate attributeName="opacity" dur="7s" repeatCount="indefinite" keyTimes="0;0.44;0.47;0.58;0.60;1" values="0;0;1;1;0;0"/>
    <animate attributeName="r" values="5;6.5;5" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="5.5" fill="#D97757" filter="url(#glow)" opacity="0">
    <animateMotion dur="7s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.45;0.60;1" keyPoints="0;0;1;1" path="M920,320 C961,320 961,212 1002,212"/>
    <animate attributeName="opacity" dur="7s" repeatCount="indefinite" keyTimes="0;0.44;0.47;0.58;0.60;1" values="0;0;1;1;0;0"/>
    <animate attributeName="r" values="5;6.5;5" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="5.5" fill="#D97757" filter="url(#glow)" opacity="0">
    <animateMotion dur="7s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.62;0.74;1" keyPoints="0;0;1;1" path="M1170,212 L1241,212"/>
    <animate attributeName="opacity" dur="7s" repeatCount="indefinite" keyTimes="0;0.61;0.64;0.72;0.74;1" values="0;0;1;1;0;0"/>
    <animate attributeName="r" values="5;6.5;5" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="4.5" fill="#F5B095" filter="url(#glow)" opacity="0">
    <animateMotion dur="7s" repeatCount="indefinite" calcMode="linear" keyTimes="0;0.78;0.97;1" keyPoints="0;0;1;1" path="M1320,243 C1320,412 346,412 346,243"/>
    <animate attributeName="opacity" dur="7s" repeatCount="indefinite" keyTimes="0;0.77;0.80;0.95;0.97;1" values="0;0;0.85;0.85;0;0"/>
