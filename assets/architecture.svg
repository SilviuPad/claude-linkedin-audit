    <animate attributeName="opacity" dur="7s" repeatCount="indefinite" keyTimes="0;0.28;0.31;0.40;0.42;1" values="0;0;1;1;0;0"/>
    <animate attributeName="r" values="5;6.5;5" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="5.5" fill="#D97757" filter="url(#glow)" opacity="0">
